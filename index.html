<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇游戏 | Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            color: #00ff88;
            margin-bottom: 10px;
        }

        .score-board {
            display: flex;
            gap: 30px;
            font-size: 1.3rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00ff88;
        }

        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3),
                        inset 0 0 50px rgba(0, 0, 0, 0.5);
            background: #0a0a15;
            max-width: 100%;
            height: auto;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
        }

        .btn-start {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.5);
        }

        .btn-pause {
            background: linear-gradient(135deg, #ffd93d, #ff9500);
            color: #1a1a2e;
        }

        .btn-pause:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 217, 61, 0.5);
        }

        .btn-reset {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: #fff;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.5);
        }

        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            margin-top: 20px;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 10px;
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mobile-btn:active {
            background: rgba(0, 255, 136, 0.5);
            transform: scale(0.95);
        }

        .mobile-btn.up { grid-column: 2; grid-row: 1; }
        .mobile-btn.left { grid-column: 1; grid-row: 2; }
        .mobile-btn.right { grid-column: 3; grid-row: 2; }
        .mobile-btn.down { grid-column: 2; grid-row: 3; }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over-content {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            border: 2px solid #ff6b6b;
            box-shadow: 0 0 50px rgba(255, 107, 107, 0.5);
        }

        .game-over-content h2 {
            font-size: 3rem;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .instructions {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            text-align: center;
            max-width: 500px;
        }

        .instructions h3 {
            color: #00ff88;
            margin-bottom: 10px;
        }

        .instructions p {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .score-board {
                gap: 20px;
                padding: 10px 20px;
            }

            .score-value {
                font-size: 1.4rem;
            }

            .controls {
                gap: 10px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            .mobile-controls {
                display: grid;
            }

            .instructions {
                display: none;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .score-board {
                font-size: 1rem;
            }

            .score-value {
                font-size: 1.2rem;
            }

            .mobile-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <h1>🐍 贪吃蛇 Snake</h1>
        
        <div class="score-board">
            <div class="score-item">
                <span class="score-label">得分 Score</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">最高分 Best</span>
                <span class="score-value" id="highScore">0</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button class="btn btn-start" id="startBtn">开始 Start</button>
            <button class="btn btn-pause" id="pauseBtn">暂停 Pause</button>
            <button class="btn btn-reset" id="resetBtn">重置 Reset</button>
        </div>

        <div class="mobile-controls">
            <button class="mobile-btn up" data-dir="up">↑</button>
            <button class="mobile-btn left" data-dir="left">←</button>
            <button class="mobile-btn right" data-dir="right">→</button>
            <button class="mobile-btn down" data-dir="down">↓</button>
        </div>

        <div class="instructions">
            <h3>🎮 游戏说明</h3>
            <p>使用 <strong>方向键</strong> 或 <strong>WASD</strong> 控制蛇的移动方向<br>
            吃到食物 🍎 得分，蛇身会变长<br>
            撞到墙壁或自己游戏结束<br>
            按 <strong>空格键</strong> 暂停/继续</p>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-content">
            <h2>游戏结束!</h2>
            <p>最终得分：<span id="finalScore">0</span></p>
            <button class="btn btn-start" onclick="game.reset()">再玩一次</button>
        </div>
    </div>

    <script>
        class SnakeGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.gridSize = 20;
                this.tileCount = this.canvas.width / this.gridSize;
                
                this.scoreElement = document.getElementById('score');
                this.highScoreElement = document.getElementById('highScore');
                this.startBtn = document.getElementById('startBtn');
                this.pauseBtn = document.getElementById('pauseBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.gameOverOverlay = document.getElementById('gameOverOverlay');
                this.finalScoreElement = document.getElementById('finalScore');

                this.highScore = localStorage.getItem('snakeHighScore') || 0;
                this.highScoreElement.textContent = this.highScore;

                this.reset();
                this.setupEventListeners();
                this.draw();
            }

            reset() {
                this.snake = [{ x: 10, y: 10 }];
                this.direction = { x: 0, y: 0 };
                this.nextDirection = { x: 0, y: 0 };
                this.food = this.spawnFood();
                this.score = 0;
                this.gameRunning = false;
                this.gamePaused = false;
                this.speed = 100;
                this.scoreElement.textContent = this.score;
                this.gameOverOverlay.style.display = 'none';
                this.startBtn.textContent = '开始 Start';
                this.draw();
            }

            spawnFood() {
                let food;
                do {
                    food = {
                        x: Math.floor(Math.random() * this.tileCount),
                        y: Math.floor(Math.random() * this.tileCount)
                    };
                } while (this.snake.some(segment => segment.x === food.x && segment.y === food.y));
                return food;
            }

            start() {
                if (!this.gameRunning) {
                    this.gameRunning = true;
                    this.direction = { x: 1, y: 0 };
                    this.nextDirection = { x: 1, y: 0 };
                    this.startBtn.textContent = '运行中...';
                    this.gameLoop();
                }
            }

            pause() {
                if (this.gameRunning) {
                    this.gamePaused = !this.gamePaused;
                    this.pauseBtn.textContent = this.gamePaused ? '继续 Resume' : '暂停 Pause';
                    if (!this.gamePaused) {
                        this.gameLoop();
                    }
                }
            }

            gameLoop() {
                if (!this.gameRunning || this.gamePaused) return;

                setTimeout(() => {
                    if (this.gameRunning && !this.gamePaused) {
                        this.update();
                        this.draw();
                        this.gameLoop();
                    }
                }, this.speed);
            }

            update() {
                this.direction = { ...this.nextDirection };

                const head = {
                    x: this.snake[0].x + this.direction.x,
                    y: this.snake[0].y + this.direction.y
                };

                // 检查撞墙
                if (head.x < 0 || head.x >= this.tileCount || 
                    head.y < 0 || head.y >= this.tileCount) {
                    this.gameOver();
                    return;
                }

                // 检查撞自己
                if (this.snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                    this.gameOver();
                    return;
                }

                this.snake.unshift(head);

                // 检查吃到食物
                if (head.x === this.food.x && head.y === this.food.y) {
                    this.score += 10;
                    this.scoreElement.textContent = this.score;
                    this.food = this.spawnFood();
                    
                    // 加速
                    if (this.speed > 50) {
                        this.speed -= 2;
                    }
                } else {
                    this.snake.pop();
                }
            }

            draw() {
                // 清空画布
                this.ctx.fillStyle = '#0a0a15';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // 画网格
                this.ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
                this.ctx.lineWidth = 0.5;
                for (let i = 0; i <= this.tileCount; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.gridSize, 0);
                    this.ctx.lineTo(i * this.gridSize, this.canvas.height);
                    this.ctx.stroke();
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.gridSize);
                    this.ctx.lineTo(this.canvas.width, i * this.gridSize);
                    this.ctx.stroke();
                }

                // 画食物
                this.ctx.fillStyle = '#ff6b6b';
                this.ctx.shadowColor = '#ff6b6b';
                this.ctx.shadowBlur = 15;
                this.ctx.beginPath();
                this.ctx.arc(
                    this.food.x * this.gridSize + this.gridSize / 2,
                    this.food.y * this.gridSize + this.gridSize / 2,
                    this.gridSize / 2 - 2,
                    0,
                    Math.PI * 2
                );
                this.ctx.fill();
                this.ctx.shadowBlur = 0;

                // 画蛇
                this.snake.forEach((segment, index) => {
                    const gradient = this.ctx.createRadialGradient(
                        segment.x * this.gridSize + this.gridSize / 2,
                        segment.y * this.gridSize + this.gridSize / 2,
                        0,
                        segment.x * this.gridSize + this.gridSize / 2,
                        segment.y * this.gridSize + this.gridSize / 2,
                        this.gridSize / 2
                    );
                    
                    if (index === 0) {
                        gradient.addColorStop(0, '#00ff88');
                        gradient.addColorStop(1, '#00cc6a');
                        this.ctx.shadowColor = '#00ff88';
                        this.ctx.shadowBlur = 10;
                    } else {
                        const alpha = 1 - (index / this.snake.length) * 0.5;
                        gradient.addColorStop(0, `rgba(0, 255, 136, ${alpha})`);
                        gradient.addColorStop(1, `rgba(0, 180, 100, ${alpha})`);
                        this.ctx.shadowBlur = 0;
                    }

                    this.ctx.fillStyle = gradient;
                    this.ctx.beginPath();
                    this.ctx.roundRect(
                        segment.x * this.gridSize + 1,
                        segment.y * this.gridSize + 1,
                        this.gridSize - 2,
                        this.gridSize - 2,
                        5
                    );
                    this.ctx.fill();

                    // 画眼睛
                    if (index === 0) {
                        this.ctx.fillStyle = '#fff';
                        this.ctx.shadowBlur = 0;
                        const eyeSize = 3;
                        const eyeOffset = 5;
                        
                        if (this.direction.x === 1) {
                            this.ctx.beginPath();
                            this.ctx.arc(segment.x * this.gridSize + this.gridSize - eyeOffset, 
                                        segment.y * this.gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                            this.ctx.arc(segment.x * this.gridSize + this.gridSize - eyeOffset, 
                                        segment.y * this.gridSize + this.gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                            this.ctx.fill();
                        } else if (this.direction.x === -1) {
                            this.ctx.beginPath();
                            this.ctx.arc(segment.x * this.gridSize + eyeOffset, 
                                        segment.y * this.gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                            this.ctx.arc(segment.x * this.gridSize + eyeOffset, 
                                        segment.y * this.gridSize + this.gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                            this.ctx.fill();
                        } else if (this.direction.y === -1) {
                            this.ctx.beginPath();
                            this.ctx.arc(segment.x * this.gridSize + eyeOffset, 
                                        segment.y * this.gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                            this.ctx.arc(segment.x * this.gridSize + this.gridSize - eyeOffset, 
                                        segment.y * this.gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                            this.ctx.fill();
                        } else {
                            this.ctx.beginPath();
                            this.ctx.arc(segment.x * this.gridSize + eyeOffset, 
                                        segment.y * this.gridSize + this.gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                            this.ctx.arc(segment.x * this.gridSize + this.gridSize - eyeOffset, 
                                        segment.y * this.gridSize + this.gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                            this.ctx.fill();
                        }
                    }
                });
            }

            gameOver() {
                this.gameRunning = false;
                this.startBtn.textContent = '开始 Start';
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    this.highScoreElement.textContent = this.highScore;
                    localStorage.setItem('snakeHighScore', this.highScore);
                }

                this.finalScoreElement.textContent = this.score;
                this.gameOverOverlay.style.display = 'flex';
            }

            setDirection(x, y) {
                // 防止反向移动
                if (this.direction.x !== -x && this.direction.y !== -y) {
                    this.nextDirection = { x, y };
                }
            }

            setupEventListeners() {
                // 按钮事件
                this.startBtn.addEventListener('click', () => this.start());
                this.pauseBtn.addEventListener('click', () => this.pause());
                this.resetBtn.addEventListener('click', () => this.reset());

                // 键盘事件
                document.addEventListener('keydown', (e) => {
                    switch(e.key) {
                        case 'ArrowUp':
                        case 'w':
                        case 'W':
                            e.preventDefault();
                            this.setDirection(0, -1);
                            break;
                        case 'ArrowDown':
                        case 's':
                        case 'S':
                            e.preventDefault();
                            this.setDirection(0, 1);
                            break;
                        case 'ArrowLeft':
                        case 'a':
                        case 'A':
                            e.preventDefault();
                            this.setDirection(-1, 0);
                            break;
                        case 'ArrowRight':
                        case 'd':
                        case 'D':
                            e.preventDefault();
                            this.setDirection(1, 0);
                            break;
                        case ' ':
                            e.preventDefault();
                            if (this.gameRunning) {
                                this.pause();
                            } else {
                                this.start();
                            }
                            break;
                    }
                });

                // 移动端按钮
                document.querySelectorAll('.mobile-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const dir = btn.dataset.dir;
                        switch(dir) {
                            case 'up': this.setDirection(0, -1); break;
                            case 'down': this.setDirection(0, 1); break;
                            case 'left': this.setDirection(-1, 0); break;
                            case 'right': this.setDirection(1, 0); break;
                        }
                        if (!this.gameRunning) this.start();
                    });
                });

                // 触摸滑动
                let touchStartX = 0;
                let touchStartY = 0;

                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: false });

                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                }, { passive: false });

                this.canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    
                    const dx = touchEndX - touchStartX;
                    const dy = touchEndY - touchStartY;
                    
                    if (Math.abs(dx) > Math.abs(dy)) {
                        if (dx > 30) this.setDirection(1, 0);
                        else if (dx < -30) this.setDirection(-1, 0);
                    } else {
                        if (dy > 30) this.setDirection(0, 1);
                        else if (dy < -30) this.setDirection(0, -1);
                    }
                    
                    if (!this.gameRunning) this.start();
                }, { passive: false });
            }
        }

        // 初始化游戏
        const game = new SnakeGame();
    </script>
</body>
</html>
